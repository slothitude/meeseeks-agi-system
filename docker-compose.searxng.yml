# SearXNG - Direct Connection (No VPN)

version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng-direct
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - UWSGI_WORKERS=4
      - UWSGI_THREADS=4
    restart: unless-stopped
