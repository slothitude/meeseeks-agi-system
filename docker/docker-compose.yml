version: '3.8'

services:
  meeseeks-box:
    build: ./meeseeks-box
    container_name: meeseeks-box
    ports:
      - "8080:8080"   # API
      - "9090:9090"   # Metrics
    volumes:
      - ../the-crypt:/app/the-crypt           # Persistent memory
      - ../logs:/app/logs                     # Logs
      - ./config:/app/config                  # Configuration
    environment:
      - OLLAMA_HOST=ollama:11434
      - OPENCLAW_URL=http://host.docker.internal:3000
    depends_on:
      - ollama
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ollama:
    image: ollama/ollama
    container_name: meeseeks-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
